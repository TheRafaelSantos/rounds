services:
  lotofacil-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotofacil-web
    command: ["python", "main.py", "--serve", "--host", "0.0.0.0", "--port", "8765"]
    environment:
      TZ: America/Sao_Paulo
      PYTHONPATH: /app/src
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  lotofacil-learning:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotofacil-learning
    command:
      [
        "python",
        "main.py",
        "--learning",
        "--learning-loop",
        "--learning-sleep-seconds",
        "30",
        "--draw-hour",
        "20",
        "--draw-minute",
        "0"
      ]
    environment:
      TZ: America/Sao_Paulo
      PYTHONPATH: /app/src
      LOTOFACIL_LEARNING_SUPERVISED_MAX: "25"
      LOTOFACIL_LEARNING_SUPERVISED_SAMPLES: "800"
      LOTOFACIL_LEARNING_TOP50_MAX: "5"
      LOTOFACIL_LEARNING_TOP50_POOL: "2000"
      LOTOFACIL_LEARNING_TOP50_EXHAUSTIVE_LIMIT: "50000"
      LOTOFACIL_LEARNING_TOP100_MAX: "3"
      LOTOFACIL_LEARNING_TOP100_POOL: "500"
      LOTOFACIL_LEARNING_TOP100_EXHAUSTIVE_LIMIT: "3000"
      LOTOFACIL_LEARNING_REPAIR_MAX: "10"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
