services:
  lotofacil-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotofacil-web
    command: ["python", "main.py", "--serve", "--host", "0.0.0.0", "--port", "8765"]
    environment:
      TZ: America/Sao_Paulo
      PYTHONPATH: /app/src
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  lotofacil-supervised:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotofacil-supervised
    command:
      [
        "python",
        "main.py",
        "--supervised-calibration",
        "--supervised-loop",
        "--supervised-from-concurso",
        "1",
        "--supervised-min-history",
        "10",
        "--supervised-samples",
        "800",
        "--supervised-max-contests",
        "25",
        "--supervised-sleep-seconds",
        "30",
        "--draw-hour",
        "20",
        "--draw-minute",
        "0"
      ]
    environment:
      TZ: America/Sao_Paulo
      PYTHONPATH: /app/src
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
